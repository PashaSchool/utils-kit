name: MY Github Action

on:
  push:
    branches: [dev]
    
  workflow_dispatch:
    inputs:
      homedrive:
        description: 'The home drive on the machine'
      Loglevel:
        description: 'Log level'
        default: 'warning'
        type: choice
        options: [info, warning, debug]
      tag: 
        description: 'Apply tag after successul test run'
        required: true
        type: boolean
      environment:
        description: 'Environment to run tests agains'
        type: environment
        required: true
  
jobs:
  MyFirstJob:
    runs-on: ubuntu-latest
    steps:
      - run: echo "Hello world"

      - name: Checkout
        uses: actions/checkout@v3.5.2

      - name: JobName
        run: "echo job: ${{ github.job }}"

      - name: List files in the reposetory
        run: |
          echo "The reposetory ${{github.reposetory}} contains the following files:" 
          tree
          
  MySecondJob:
    runs-on: ubuntu-latest
    needs: MyFirstJob
    steps:
      - run: echo "Hey, i'm the second job"

  MyThirdJob:
    runs-on: ubuntu-latest
    needs: [MyFirstJob, MySecondJob]
    steps:
      - run: "echo Job ${{github.job}}"
